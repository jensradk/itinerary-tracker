<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Itinerary Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div id="map"></div>

<button class="fab" id="btn-list">
  <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="19" y2="6"/><line x1="3" y1="11" x2="19" y2="11"/><line x1="3" y1="16" x2="19" y2="16"/></svg>
  <span class="badge" id="badge" style="display:none">0</span>
</button>
<button class="fab" id="btn-locate">
  <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="10" cy="10" r="3"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="10" y1="16" x2="10" y2="19"/><line x1="1" y1="10" x2="4" y2="10"/><line x1="16" y1="10" x2="19" y2="10"/></svg>
</button>
<button class="fab" id="btn-import">
  <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="11" y1="5" x2="11" y2="17"/><line x1="5" y1="11" x2="17" y2="11"/></svg>
</button>

<!-- List Panel -->
<div class="panel-overlay" id="panel-overlay">
  <div class="panel">
    <div class="panel-header">
      <h2>Places <span class="header-count" id="header-count"></span></h2>
      <button class="panel-close" id="panel-close">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="4" x2="14" y2="14"/><line x1="14" y1="4" x2="4" y2="14"/></svg>
      </button>
    </div>
    <div class="panel-filters" id="visit-filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="unvisited">Not visited</button>
      <button class="filter-btn" data-filter="visited">Visited</button>
    </div>
    <div class="cat-filters" id="cat-filters"></div>
    <input type="text" class="panel-search" id="panel-search" placeholder="Search…">
    <div class="panel-list" id="panel-list"></div>
    <div class="panel-footer" id="panel-footer" style="display:none">
      <button class="btn-export" id="btn-export">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:6px"><path d="M3 7l4 4 4-4"/><line x1="7" y1="1" x2="7" y2="11"/><line x1="1" y1="13" x2="13" y2="13"/></svg>Export as JSON
      </button>
      <button class="btn-clear" id="btn-clear">Reset all places</button>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>Import places</h2>
    <p class="modal-sub">Choose a trip from the library, upload a JSON file, or import from Google Takeout CSV.</p>
    <div class="import-tabs">
      <button class="import-tab active" data-tab="library">Library</button>
      <button class="import-tab" data-tab="json">JSON file</button>
      <button class="import-tab" data-tab="csv">CSV</button>
    </div>

    <!-- Library pane -->
    <div class="import-pane active" id="pane-library">
      <div id="lib-content"><div class="lib-loading"><span class="spinner" style="display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px;"></span> Loading trips…</div></div>
    </div>

    <!-- JSON pane -->
    <div class="import-pane" id="pane-json">
      <div class="drop-zone" id="drop-json">
        <div class="dz-icon"><svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 16V4m0 0l-4 4m4-4l4 4"/><path d="M20 16v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2"/></svg></div>
        <p>Drop <strong>.json</strong> file here</p><p class="sub">or click to choose</p>
      </div>
      <input type="file" id="file-json" accept=".json" style="display:none">
      <div class="file-selected" id="json-selected">
        <div class="fs-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg></div>
        <div class="fs-info"><div class="fs-name" id="json-name"></div><div class="fs-detail" id="json-detail"></div></div>
        <button class="fs-remove" id="json-remove"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg></button>
      </div>
      <div class="btn-row" id="json-btn-row"><button class="btn btn-secondary json-cancel">Cancel</button><button class="btn btn-primary" id="json-import-btn">Import</button></div>
    </div>

    <!-- CSV pane -->
    <div class="import-pane" id="pane-csv">
      <div class="drop-zone" id="drop-csv">
        <div class="dz-icon"><svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 16V4m0 0l-4 4m4-4l4 4"/><path d="M20 16v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2"/></svg></div>
        <p>Drop <strong>.csv</strong> file here</p><p class="sub">or click to choose</p>
      </div>
      <input type="file" id="file-csv" accept=".csv" style="display:none">
      <div class="file-selected" id="csv-selected">
        <div class="fs-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg></div>
        <div class="fs-info"><div class="fs-name" id="csv-name"></div><div class="fs-detail" id="csv-detail"></div></div>
        <button class="fs-remove" id="csv-remove"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg></button>
      </div>
      <div class="btn-row" id="csv-btn-row-normal"><button class="btn btn-secondary csv-cancel">Cancel</button><button class="btn btn-primary" id="csv-import-btn">Import</button></div>
      <div class="btn-row" id="csv-btn-row-stop" style="display:none"><button class="btn btn-stop" id="modal-stop" style="flex:1">⏹ Stop import</button></div>
    </div>

    <div class="status-bar" id="status"></div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
